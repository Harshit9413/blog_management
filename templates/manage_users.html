<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Users</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    padding: 30px;
}
.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
}
.table { color: white; }
select { background: black; color: white; }
</style>
</head>

<body>
<div class="card">

<h2>👥 Manage Users</h2>

<!-- 🔍 Search -->
<form method="get" action="/super-admin/users" class="mb-3">
    <input type="text" name="search" placeholder="Search by email"
           value="{{ search or '' }}" class="form-control">
</form>

<table class="table table-bordered mt-3">
    <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Role</th>
            <th>Block/Unblock</th>  <!-- ✅ Added column -->
            <th>Change Role</th>
            <th>Delete</th>
        </tr>
    </thead>

    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.role }}</td>

            <!-- ✅ Toggle Block/Unblock — now INSIDE the for loop -->
            <td>
                <form action="/super-admin/toggle-user/{{ u.id }}" method="post">
                    <button class="btn btn-secondary btn-sm">
                        {{ "Block" if u.is_active else "Unblock" }}
                    </button>
                </form>
            </td>

            <!-- 🔄 Change Role -->
            <td>
                <form action="/super-admin/update-role/{{ u.id }}" method="post">
                    <select name="role">
                        <option value="user">User</option>
                        <option value="clientadmin">Client Admin</option>
                        <option value="superadmin">Super Admin</option>
                    </select>
                    <button class="btn btn-warning btn-sm mt-1">Update</button>
                </form>
            </td>

            <!-- ❌ Delete -->
            <td>
                <form action="/super-admin/delete-user/{{ u.id }}" method="post">
                    <button class="btn btn-danger btn-sm">Delete</button>
                </form>
            </td>

        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/super-admin/dashboard" class="btn btn-light mt-3">⬅ Back</a>

</div>
</body>
</html>
