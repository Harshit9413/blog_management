<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logout</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(120deg,#667eea,#764ba2);
color:white;
}

.box{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:12px;
text-align:center;
backdrop-filter:blur(10px);
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#3e8e41;
}

</style>
</head>

<body>

<div class="box">

<h1>Logout Successful 👋</h1>

<p>You have been logged out successfully.</p>

<a href="/login">
<button>Login Again</button>
</div>

</body>
</html>
