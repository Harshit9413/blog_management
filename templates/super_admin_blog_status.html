<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blog Status - Super Admin</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
body { background:linear-gradient(120deg,#1a1a2e,#16213e); min-height:100vh; color:white; padding:30px; }
.back-btn { display:inline-block; margin-bottom:20px; padding:8px 18px; background:rgba(255,255,255,0.1); border:2px solid #e94560; border-radius:20px; color:#e94560; text-decoration:none; transition:0.3s; font-weight:bold; }
.back-btn:hover { background:#e94560; color:white; }
h1 { margin-bottom:24px; color:#e94560; }
table { width:100%; border-collapse:collapse; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden; }
th, td { padding:14px 18px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.1); }
th { background:rgba(0,0,0,0.3); color:#e94560; font-size:14px; }
td { font-size:14px; }
.status-created { color:#4caf50; font-weight:bold; }
.status-not { color:#f44336; font-weight:bold; }
.btn-view { background:#4CAF50; border:none; color:white; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; text-decoration:none; display:inline-block; transition:0.2s; }
.btn-view:hover { background:#388E3C; }
.no-blog { opacity:0.5; font-size:13px; }
/* Modal */
.modal-overlay{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999; justify-content:center; align-items:center; backdrop-filter:blur(5px); }
.modal-overlay.active{ display:flex; }
.modal{ background:linear-gradient(135deg,#1a1a2e,#16213e); border-radius:16px; padding:35px; max-width:700px; width:90%; max-height:80vh; overflow-y:auto; color:white; box-shadow:0 10px 40px rgba(0,0,0,0.4); position:relative; animation:slideUp 0.3s ease; }
@keyframes slideUp{ from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }
.modal-close{ position:absolute; top:15px; right:20px; background:none; border:none; color:white; font-size:24px; cursor:pointer; opacity:0.7; }
.modal-close:hover{ opacity:1; }
.modal h2{ font-size:24px; margin-bottom:10px; padding-right:30px; }
.modal-meta{ font-size:13px; opacity:0.6; margin-bottom:8px; }
.modal-divider{ border:none; border-top:1px solid rgba(255,255,255,0.2); margin:18px 0; }
.modal-desc{ font-size:15px; opacity:0.85; font-style:italic; margin-bottom:15px; line-height:1.6; }
.modal-content{ font-size:14px; line-height:1.8; white-space:pre-wrap; }
.modal-loading{ text-align:center; padding:40px; opacity:0.7; }
</style>
</head>
<body>
<a href="/super-admin/dashboard" class="back-btn">← Back to Dashboard</a>
<h1>📊 Blog Status - All Users</h1>
<table>
    <thead>
        <tr>
            <th>Email</th>
            <th>Status</th>
            <th>Title</th>
            <th>Time</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for d in data %}
        <tr>
            <td>{{ d.email }}</td>
            <td class="{{ 'status-created' if d.has_blog else 'status-not' }}">{{ d.status }}</td>
            <td>{{ d.title }}</td>
            <td>{{ d.time.strftime("%b %d, %Y %I:%M %p") if d.has_blog else "-" }}</td>
            <td>
                {% if d.has_blog %}
                    <button class="btn-view" onclick="viewBlog({{ d.blog_id }})">View</button>
                {% else %}
                    <span class="no-blog">No Blog</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<!-- Blog Detail Modal -->
<div class="modal-overlay" id="blog-modal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModalDirect()">&times;</button>
        <div id="modal-body"><p class="modal-loading">Loading...</p></div>
    </div>
</div>

<script>
async function viewBlog(id) {
    const modal = document.getElementById("blog-modal");
    const body = document.getElementById("modal-body");
    modal.classList.add("active");
    body.innerHTML = '<p class="modal-loading">Loading blog...</p>';
    try {
        const res = await fetch(`/blog/${id}`, { credentials: "include" });
        if (!res.ok) { body.innerHTML = '<p class="modal-loading">Blog not found</p>'; return; }
        const blog = await res.json();
        body.innerHTML = `
            <h2>${blog.title}</h2>
            <p class="modal-meta">✍️ By: <strong>${blog.owner_email || 'Unknown'}</strong></p>
            <p class="modal-meta">📅 ${blog.created_at ? new Date(blog.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : ''}</p>
            <hr class="modal-divider">
            ${blog.description ? `<p class="modal-desc">${blog.description}</p>` : ''}
            <div class="modal-content">${blog.content}</div>
        `;
    } catch (err) { body.innerHTML = '<p class="modal-loading">Error loading blog</p>'; }
}
function closeModal(event) { if (event.target === document.getElementById("blog-modal")) document.getElementById("blog-modal").classList.remove("active"); }
function closeModalDirect() { document.getElementById("blog-modal").classList.remove("active"); }
document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeModalDirect(); });
</script>
</body>
</html>
