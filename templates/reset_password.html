<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#667eea,#764ba2); }
.card{ background:rgba(255,255,255,0.15); backdrop-filter:blur(14px); padding:40px; border-radius:16px; width:380px; color:white; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
h2{ text-align:center; margin-bottom:25px; }
.input-group{ margin-bottom:18px; }
.input-group input{ width:100%; padding:12px; border:none; border-radius:6px; outline:none; font-size:14px; }
button{ width:100%; padding:12px; border:none; border-radius:6px; background:white; color:#333; font-weight:bold; cursor:pointer; font-size:14px; }
button:hover{ background:#f0f0f0; }
#error{ color:#ff6b6b; text-align:center; margin-bottom:10px; font-size:13px; }
#success{ color:lightgreen; text-align:center; margin-bottom:10px; font-size:13px; }
.back-link{ text-align:center; margin-top:18px; }
.back-link a{ color:white; }
</style>
</head>
<body>
<div class="card">
    <h2>Reset Password</h2>
    <p id="error"></p>
    <p id="success"></p>
    <form onsubmit="resetPw(event)">
        <div class="input-group">
            <input id="email" type="email" placeholder="Email" required>
        </div>
        <div class="input-group">
            <input id="new_password" type="password" placeholder="New Password" required>
        </div>
        <button type="submit">Reset Password</button>
    </form>
    <div class="back-link">
        <a href="/login">Back to Login</a>
    </div>
</div>
<script>
async function resetPw(e) {
    e.preventDefault();
    document.getElementById("error").innerText = "";
    document.getElementById("success").innerText = "";
    const res = await fetch("/reset-password", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            new_password: document.getElementById("new_password").value
        })
    });
    const data = await res.json();
    if (res.ok) {
        document.getElementById("success").innerText = data.message;
        setTimeout(() => { window.location.href = "/login?msg=Password reset successful"; }, 1500);
    } else {
        document.getElementById("error").innerText = data.error || "Failed";
    }
}
</script>
</body>
</html>
