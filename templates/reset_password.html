<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family: 'Segoe UI', sans-serif;
}

.card{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:20px;
    width:320px;
    color:white;
    text-align:center;
}

input, button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    background:white;
    font-weight:bold;
    cursor:pointer;
    color:#764ba2;
}

button:hover{
    background:#f0e6ff;
}

#message{
    margin-bottom:10px;
    font-size:14px;
    min-height:20px;
}

.error{
    color:#ff6b6b;
}

.success{
    color:#6bffb8;
}
</style>

</head>

<body>

<div class="card">

<h2>Reset Password</h2>

<p id="message"></p>

<input id="new_password" type="password" placeholder="New Password">
<input id="confirm_password" type="password" placeholder="Confirm Password">

<button onclick="resetPassword()">Update Password</button>

</div>
<script>

const urlParams = new URLSearchParams(window.location.search);
const email = urlParams.get("email");

async function resetPassword(){
    const new_password = document.getElementById("new_password").value;
    const confirm_password = document.getElementById("confirm_password").value;
    const msg = document.getElementById("message");

    msg.innerText = "";

    if(!email){
        msg.innerText = "❌ Session expired. Please try again.";
        return;
    }

    if(!new_password || !confirm_password){
        msg.innerText = "❌ All fields are required.";
        return;
    }

    if(new_password !== confirm_password){
        msg.innerText = "❌ Passwords do not match.";
        return;
    }

    const res = await fetch("/reset-password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: email.trim().toLowerCase(),
            new_password: new_password
        })
    });

    // ✅ DEBUG — log everything
    console.log("Status:", res.status);
    console.log("res.ok:", res.ok);

    const data = await res.json();
    console.log("Response data:", data);

    if(res.ok){
        console.log("✅ Redirecting now...");
        window.location.replace("/password-updated");
    } else {
        msg.innerText = data.error || "Something went wrong.";
    }
}

</script>

</body>
</html>
