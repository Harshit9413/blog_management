<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Admin Dashboard</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
body{ background:linear-gradient(120deg,#0f2027,#203a43,#2c5364); min-height:100vh; color:white; }
.navbar{ display:flex; justify-content:space-between; align-items:center; padding:15px 40px; background:rgba(0,0,0,0.3); backdrop-filter:blur(10px); }
.navbar h2{ color:#00d2ff; letter-spacing:1px; }
.nav-right{ display:flex; align-items:center; gap:15px; }
.logout-btn{ background:#00d2ff; border:none; padding:8px 15px; color:#0f2027; cursor:pointer; border-radius:5px; font-weight:bold; }
.container{ padding:40px; max-width:1100px; margin:0 auto; }
.welcome{ margin-bottom:30px; }
.welcome h1{ font-size:28px; }
.welcome p{ opacity:0.7; margin-top:5px; }
.nav-buttons{ display:flex; gap:12px; margin-bottom:25px; flex-wrap:wrap; }
.nav-btn{ padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size:14px; text-decoration:none; color:#0f2027; }
.nav-btn-blogs{ background:#00d2ff; }
.nav-btn-status{ background:#ff9800; }
.nav-btn-blogs:hover{ background:#00b8d9; }
.nav-btn-status:hover{ background:#e68900; }
.search-bar{ margin-bottom:25px; display:flex; gap:10px; }
.search-bar input{ flex:1; padding:12px; border:none; border-radius:6px; font-size:14px; }
.search-bar button{ padding:12px 20px; border:none; border-radius:6px; background:#00d2ff; color:#0f2027; cursor:pointer; font-weight:bold; }
table{ width:100%; border-collapse:collapse; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden; }
th,td{ padding:12px 15px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.1); }
th{ background:rgba(0,0,0,0.3); color:#00d2ff; }
.btn{ padding:5px 12px; border:none; border-radius:4px; cursor:pointer; font-size:12px; margin:2px; }
.btn-block{ background:#ff9800; color:white; }
.btn-unblock{ background:#4caf50; color:white; }
.btn-delete{ background:#f44336; color:white; }
.btn-save{ background:#2196f3; color:white; }
.email-input{ padding:4px 8px; border-radius:4px; border:none; font-size:12px; width:180px; }
.status-active{ color:#4caf50; }
.status-blocked{ color:#f44336; }
#msg{ text-align:center; margin-bottom:15px; font-size:14px; }
</style>
</head>
<body>
<div class="navbar">
    <h2>🔧 Client Admin</h2>
    <div class="nav-right">
        <span>{{ user.email }}</span>
        <form action="/logout" method="post" style="display:inline;">
            <button class="logout-btn">Logout</button>
        </form>
    </div>
</div>
<div class="container">
    <div class="welcome">
        <h1>Client Admin Dashboard</h1>
        <p>Manage regular users from here</p>
    </div>
    <div class="nav-buttons">
        <a href="/client-admin/blogs" class="nav-btn nav-btn-blogs">📝 Manage Blogs</a>
        <a href="/client-admin/blog-status" class="nav-btn nav-btn-status">📊 Blog Status</a>
    </div>
    <div class="search-bar">
        <input id="search" type="text" placeholder="Search users by email...">
        <button onclick="loadUsers()">Search</button>
    </div>
    <p id="msg"></p>
    <table>
        <thead>
            <tr><th>ID</th><th>Email</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="user-table">
            <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
        </tbody>
    </table>
</div>
<script>
function showMsg(text, color) {
    const el = document.getElementById("msg");
    el.innerText = text; el.style.color = color || "lightgreen";
    setTimeout(() => el.innerText = "", 3000);
}
async function loadUsers() {
    const search = document.getElementById("search").value.trim();
    const res = await fetch("/client-admin/users-json?search=" + encodeURIComponent(search), { credentials: "include" });
    if (!res.ok) { showMsg("Failed to load", "#ff6b6b"); return; }
    const users = await res.json();
    const tbody = document.getElementById("user-table");
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No users found</td></tr>'; return; }
    tbody.innerHTML = users.map(u => `
        <tr>
            <td>${u.id}</td>
            <td>
                <input class="email-input" id="email-${u.id}" value="${u.email}">
                <button class="btn btn-save" onclick="updateEmail(${u.id})">Save</button>
            </td>
            <td class="${u.is_active ? 'status-active' : 'status-blocked'}">${u.is_active ? 'Active' : 'Blocked'}</td>
            <td>
                <button class="btn ${u.is_active ? 'btn-block' : 'btn-unblock'}" onclick="toggleUser(${u.id})">${u.is_active ? 'Block' : 'Unblock'}</button>
                <button class="btn btn-delete" onclick="deleteUser(${u.id})">Delete</button>
            </td>
        </tr>
    `).join("");
}
async function toggleUser(id) {
    const res = await fetch("/client-admin/toggle-user/" + id, { method: "POST", credentials: "include" });
    const data = await res.json();
    if (res.ok) { showMsg("Status updated"); loadUsers(); } else showMsg(data.error, "#ff6b6b");
}
async function updateEmail(id) {
    const email = document.getElementById("email-" + id).value.trim();
    const res = await fetch("/client-admin/update-email/" + id, {
        method: "POST", credentials: "include",
        headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email })
    });
