<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Admin Dashboard</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
body{ background:linear-gradient(120deg,#1a1a2e,#16213e); min-height:100vh; color:white; }
.navbar{ display:flex; justify-content:space-between; align-items:center; padding:15px 40px; background:rgba(0,0,0,0.3); backdrop-filter:blur(10px); }
.navbar h2{ color:#e94560; letter-spacing:1px; }
.nav-right{ display:flex; align-items:center; gap:15px; }
.nav-right a{ color:white; text-decoration:none; padding:8px 15px; border-radius:5px; background:rgba(255,255,255,0.1); }
.nav-right a:hover{ background:rgba(255,255,255,0.2); }
.logout-btn{ background:#e94560; border:none; padding:8px 15px; color:white; cursor:pointer; border-radius:5px; }
.container{ padding:40px; max-width:1200px; margin:0 auto; }
.stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:40px; }
.stat-card{ background:rgba(255,255,255,0.08); padding:25px; border-radius:12px; text-align:center; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); }
.stat-card h3{ font-size:36px; color:#e94560; margin-bottom:5px; }
.stat-card p{ opacity:0.7; }
.section{ background:rgba(255,255,255,0.08); padding:25px; border-radius:12px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.1); }
.section h3{ margin-bottom:15px; color:#e94560; }
.welcome{ margin-bottom:30px; }
.welcome h1{ font-size:28px; }
.welcome p{ opacity:0.7; margin-top:5px; }
</style>
</head>
<body>
<div class="navbar">
    <h2>⚡ Super Admin</h2>
    <div class="nav-right">
        <a href="/super-admin/users">Manage Users</a>
        <span>{{ user.email }}</span>
        <form action="/logout" method="post" style="display:inline;">
            <button class="logout-btn">Logout</button>
        </form>
    </div>
</div>
<div class="container">
    <div class="welcome">
        <h1>Super Admin Dashboard</h1>
        <p>Welcome back, {{ user.email }}</p>
    </div>
    <a href="/super-admin/blogs" style="display:inline-block; padding:12px 24px; background:linear-gradient(135deg,#ff7eb3,#ff758c); color:white; border-radius:30px; text-decoration:none; font-weight:bold; margin-top:16px;">
    📝 Manage All Blogs
</a>
    <div class="stats">
        <div class="stat-card"><h3 id="total-users">-</h3><p>Total Users</p></div>
        <div class="stat-card"><h3 id="total-admins">-</h3><p>Client Admins</p></div>
        <div class="stat-card"><h3 id="total-superadmins">-</h3><p>Super Admins</p></div>
    </div>
    <div class="section">
        <h3>Quick Actions</h3>
        <p>Use the <a href="/super-admin/users" style="color:#e94560;">Manage Users</a> page to block/unblock users, change roles, update emails, or delete accounts.</p>
    </div>
</div>
<script>
async function loadStats() {
    const res = await fetch("/super-admin/stats", { credentials: "include" });
    if (res.ok) {
        const data = await res.json();
        document.getElementById("total-users").innerText = data.total || 0;
        document.getElementById("total-admins").innerText = data.admins || 0;
        document.getElementById("total-superadmins").innerText = data.superadmins || 0;
    }
}
loadStats();
</script>
</body>
</html>
