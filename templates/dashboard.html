<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* Background */
body{
background:linear-gradient(120deg,#667eea,#764ba2);
min-height:100vh;
color:white;
}

/* Navbar */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
}

.navbar h2{
letter-spacing:1px;
}

.logout-btn{
background:#ff4d4d;
border:none;
padding:8px 15px;
color:white;
cursor:pointer;
border-radius:5px;
text-decoration:none;
}

/* Container */
.container{
padding:40px;
}

/* Welcome */
.welcome{
margin-bottom:30px;
}

/* Cards */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.15);
padding:25px;
border-radius:12px;
text-align:center;
backdrop-filter:blur(10px);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* Profile */
.profile{
margin-top:40px;
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:10px;
}

.profile h3{
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="navbar">
<h2>My Dashboard</h2>

<!-- Fixed logout button using GET request -->
<form action="/logout" method="post" style="display:inline;">
    <button class="logout-btn">Logout</button>
</form>

</div>
<form action="/blogs/" method="post">
  <input type="text" name="title" placeholder="Title" required>
  <input type="text" name="description" placeholder="Description" required>
  <textarea name="content" placeholder="Content"></textarea>
  <button type="submit">Create Blog</button>
</form>
<div class="container">

<div class="welcome">
<h1>Login Successful 🎉</h1>
<h2>Welcome {{ user.email }}</h2>
</div>

<div class="cards">

<div class="card">
<h3>Email</h3>
<p>{{ user.email }}</p>
</div>

<div class="card">
<h3>Phone Number</h3>
<p>{{ user.phone }}</p>
</div>

<div class="card">
<h3>Gender</h3>
<p>{{ user.gender }}</p>
</div>

</div>

<div class="profile">
<h3>User Information</h3>
<p><b>Email:</b> {{ user.email }}</p>
<p><b>Gender:</b> {{ user.gender }}</p>
<p><b>Status:</b> Active</p>
</div>

</div>

</body>
</html>
