<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body {
    height:100vh; display:flex; justify-content:center; align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}
.login-card {
    background:rgba(255,255,255,0.15); backdrop-filter:blur(14px);
    padding:40px; border-radius:16px; width:360px; color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h2 { text-align:center; margin-bottom:25px; }
.input-group { margin-bottom:20px; }
.input-group input {
    width:100%; padding:12px; border:none;
    border-radius:6px; outline:none; font-size:14px;
}
button {
    width:100%; padding:12px; border:none; border-radius:6px;
    background:white; color:#333; font-weight:bold;
    cursor:pointer; font-size:14px;
}
button:hover { background:#f0f0f0; }
.forgot { text-align:right; margin-bottom:15px; }
.forgot a, .register a { color:white; }
.register { text-align:center; margin-top:18px; }
#error { color:#ff6b6b; text-align:center; margin-bottom:10px; font-size:13px; min-height:18px; }
#success { color:lightgreen; text-align:center; margin-bottom:10px; font-size:13px; }
</style>
</head>


<body>

<div class="login-card">
    <h2>Welcome Back</h2>

    <p id="error"></p>

    {% if message %}
    <p id="success">{{ message }}</p>
    {% endif %}

    <form onsubmit="loginUser(event)">
        <div class="input-group">
            <input id="email" type="email" placeholder="Email" required>
        </div>
        <div class="input-group">
            <input id="password" type="password" placeholder="Password" required>
        </div>
        <div class="forgot">
            <a href="/forgot-password">Forgot password?</a>
        </div>
        <button type="submit" id="btn">Login</button>
    </form>

    <div class="register">
        <p>Don't have an account?</p>
        <a href="/register">Create Account</a>
    </div>
</div>
<script>
async function loginUser(e) {
    e.preventDefault();

    const btn = document.getElementById("btn");
    btn.disabled = true;
    btn.innerText = "Logging in...";
    document.getElementById("error").innerText = "";

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value
        }),
        credentials: "include"
    });

    const data = await res.json();

    if (res.ok) {
        window.location.href = data.redirect;
    } else {
        document.getElementById("error").innerText = data.error;
        btn.disabled = false;
        btn.innerText = "Login";
    }
}
</script>

</body>
</html>
