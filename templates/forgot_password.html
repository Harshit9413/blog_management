<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#667eea,#764ba2); }
.card{ background:rgba(255,255,255,0.15); backdrop-filter:blur(14px); padding:40px; border-radius:16px; width:380px; color:white; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
h2{ text-align:center; margin-bottom:10px; }
p.sub{ text-align:center; margin-bottom:25px; opacity:0.8; font-size:14px; }
.input-group{ margin-bottom:18px; }
.input-group input{ width:100%; padding:12px; border:none; border-radius:6px; outline:none; font-size:14px; }
button{ width:100%; padding:12px; border:none; border-radius:6px; background:white; color:#333; font-weight:bold; cursor:pointer; font-size:14px; margin-bottom:10px; }
button:hover{ background:#f0f0f0; }
#error{ color:#ff6b6b; text-align:center; margin-bottom:10px; font-size:13px; }
#success{ color:lightgreen; text-align:center; margin-bottom:10px; font-size:13px; }
.step{ display:none; }
.step.active{ display:block; }
.back-link{ text-align:center; margin-top:15px; }
.back-link a{ color:white; }
</style>
</head>
<body>
<div class="card">
    <h2>Forgot Password</h2>
    <p class="sub">Reset your password in 3 steps</p>
    <p id="error"></p>
    <p id="success"></p>

    <div id="step1" class="step active">
        <div class="input-group">
            <input id="email" type="email" placeholder="Enter your email" required>
        </div>
        <button onclick="sendOTP()">Send OTP</button>
    </div>

    <div id="step2" class="step">
        <div class="input-group">
            <input id="otp" type="text" placeholder="Enter 6-digit OTP" maxlength="6" required>
        </div>
        <button onclick="verifyOTP()">Verify OTP</button>
    </div>

    <div id="step3" class="step">
        <div class="input-group">
            <input id="new-password" type="password" placeholder="New Password" required>
        </div>
        <button onclick="resetPassword()">Reset Password</button>
    </div>

    <div class="back-link">
        <a href="/login">Back to Login</a>
    </div>
</div>
<script>
let userEmail = "";
function showStep(n) {
    document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
    document.getElementById("step" + n).classList.add("active");
    document.getElementById("error").innerText = "";
    document.getElementById("success").innerText = "";
}
async function sendOTP() {
    userEmail = document.getElementById("email").value.trim();
    if (!userEmail) { document.getElementById("error").innerText = "Enter email"; return; }
    const res = await fetch("/forgot-password", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: userEmail })
    });
    const data = await res.json();
    if (res.ok) {
        document.getElementById("success").innerText = "OTP sent to your email!";
        setTimeout(() => showStep(2), 1000);
    } else {
        document.getElementById("error").innerText = data.error || "Failed";
    }
}
async function verifyOTP() {
    const otp = document.getElementById("otp").value.trim();
    if (!otp) { document.getElementById("error").innerText = "Enter OTP"; return; }
    const res = await fetch("/verify-otp", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: userEmail, otp })
    });
    const data = await res.json();
    if (res.ok) {
        document.getElementById("success").innerText = "OTP verified!";
        setTimeout(() => showStep(3), 1000);
    } else {
        document.getElementById("error").innerText = data.error || "Invalid OTP";
    }
}
async function resetPassword() {
    const pw = document.getElementById("new-password").value;
    if (!pw) { document.getElementById("error").innerText = "Enter new password"; return; }
    const res = await fetch("/reset-password", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: userEmail, new_password: pw })
    });
    const data = await res.json();
    if (res.ok) {
        document.getElementById("success").innerText = "Password reset! Redirecting...";
        setTimeout(() => { window.location.href = "/login?msg=Password reset successful"; }, 1500);
    } else {
        document.getElementById("error").innerText = data.error || "Failed";
    }
}
</script>
</body>
</html>
