<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: 'Segoe UI', sans-serif;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    width: 340px;
    color: white;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    text-align: center;
}

h2 { margin-bottom: 6px; font-size: 22px; }
.subtitle { font-size: 13px; opacity: 0.75; margin-bottom: 20px; }

/* Stepper */
.stepper {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
}
.step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5);
    transition: all .3s; flex-shrink: 0;
}
.step-dot.active { border-color: #fff; color: #fff; }
.step-dot.done   { background: #fff; color: #764ba2; border-color: #fff; }
.step-line       { flex: 1; height: 2px; background: rgba(255,255,255,0.3); max-width: 50px; transition: background .3s; }

/* Panels */
.panel { display: none; flex-direction: column; gap: 12px; }
.panel.active { display: flex; }

input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
}
input::placeholder { color: rgba(255,255,255,0.5); }
input:focus { border-color: rgba(255,255,255,0.8); }

.otp-input {
    letter-spacing: 8px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
}

.btn {
    width: 100%; padding: 12px;
    border: none; border-radius: 10px;
    background: white; color: #764ba2;
    font-weight: 700; font-size: 15px;
    cursor: pointer; transition: opacity .2s, transform .1s;
}
.btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Messages */
.msg {
    padding: 9px 12px; border-radius: 8px;
    font-size: 13px; display: none; text-align: left; line-height: 1.4;
}
.msg.error   { background: rgba(220,38,38,0.35);  border: 1px solid rgba(220,38,38,0.6);  display: block; }
.msg.success { background: rgba(34,197,94,0.25);  border: 1px solid rgba(34,197,94,0.5);  display: block; }

/* Timer */
.timer-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; opacity: 0.85; }
.tval { font-weight: 700; }
.tval.expired { color: #fca5a5; }

.btn-resend {
    background: none; border: none; color: white;
    font-size: 12px; cursor: pointer; text-decoration: underline; padding: 0;
}
.btn-resend:disabled { opacity: 0.4; cursor: not-allowed; }

.hint { font-size: 11px; opacity: 0.65; text-align: left; }
.back { display: block; color: rgba(255,255,255,0.7); font-size: 13px; text-decoration: none; }
.back:hover { color: white; }
</style>
</head>
<body>
<div class="card">
    <h2>🔐 Forgot Password</h2>
    <p class="subtitle">Reset your password in 3 easy steps</p>

    <!-- Stepper -->
    <div class="stepper">
        <div class="step-dot active" id="sd1">1</div>
        <div class="step-line" id="sl1"></div>
        <div class="step-dot" id="sd2">2</div>
        <div class="step-line" id="sl2"></div>
        <div class="step-dot" id="sd3">3</div>
    </div>

    <!-- Step 1: Email -->
    <div class="panel active" id="p1">
        <input type="email" id="email" placeholder="Enter your registered email"
               onkeydown="if(event.key==='Enter') sendOTP()"/>
        <button class="btn" id="btnSend" onclick="sendOTP()">Send OTP</button>
        <div class="msg" id="m1"></div>
        <a class="back" href="/login">← Back to Login</a>
    </div>

    <!-- Step 2: OTP -->
    <div class="panel" id="p2">
        <p style="font-size:13px;opacity:0.85;">OTP sent to <strong id="emailShow"></strong></p>
        <input class="otp-input" type="text" id="otp"
               maxlength="6" placeholder="······" inputmode="numeric"
               onkeydown="if(event.key==='Enter') verifyOTP()"/>
        <div class="timer-row">
            <span>Expires in <span class="tval" id="tval">05:00</span></span>
            <button class="btn-resend" id="btnResend" disabled onclick="resendOTP()">Resend OTP</button>
        </div>
        <button class="btn" id="btnVerify" onclick="verifyOTP()">Verify OTP</button>
        <div class="msg" id="m2"></div>
    </div>

    <!-- Step 3: New Password -->
    <div class="panel" id="p3">
        <input type="password" id="np" placeholder="New password"
               onkeydown="if(event.key==='Enter') resetPassword()"/>
        <input type="password" id="cp" placeholder="Confirm new password"
               onkeydown="if(event.key==='Enter') resetPassword()"/>
        <p class="hint">Min 6 characters with at least one letter and one number.</p>
        <button class="btn" id="btnReset" onclick="resetPassword()">Reset Password</button>
        <div class="msg" id="m3"></div>
    </div>
</div>

<script>
let userEmail = "";
let timerID   = null;

function goStep(n) {
    [1,2,3].forEach(i => {
        document.getElementById(`p${i}`).classList.toggle("active", i === n);
        const d = document.getElementById(`sd${i}`);
        if      (i < n)  { d.className = "step-dot done";   d.textContent = "✓"; }
        else if (i === n){ d.className = "step-dot active";  d.textContent = i;   }
        else             { d.className = "step-dot";         d.textContent = i;   }
    });
    document.getElementById("sl1").style.background = n >= 2 ? "white" : "rgba(255,255,255,0.3)";
    document.getElementById("sl2").style.background = n >= 3 ? "white" : "rgba(255,255,255,0.3)";
}

function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text; el.className = `msg ${type}`;
}
function clearMsg(id) {
    const el = document.getElementById(id);
    el.className = "msg"; el.textContent = "";
}

function startTimer(sec) {
    clearInterval(timerID);
    const tv = document.getElementById("tval");
    const rb = document.getElementById("btnResend");
    rb.disabled = true; tv.className = "tval";
    let rem = sec;
    function tick() {
        const m = String(Math.floor(rem / 60)).padStart(2, "0");
        const s = String(rem % 60).padStart(2, "0");
        tv.textContent = `${m}:${s}`;
        if (rem-- <= 0) {
            clearInterval(timerID);
            tv.className = "tval expired"; tv.textContent = "expired";
            rb.disabled = false;
        }
    }
    tick(); timerID = setInterval(tick, 1000);
}

async function api(url, body) {
    const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });
    return { ok: r.ok, data: await r.json() };
}

async function sendOTP() {
    clearMsg("m1");
    const email = document.getElementById("email").value.trim();
    if (!email) { showMsg("m1", "Please enter your email.", "error"); return; }

    const btn = document.getElementById("btnSend");
    btn.disabled = true; btn.textContent = "Sending…";

    try {
        const { ok, data } = await api("/forgot-password", { email });
        if (!ok) {
            showMsg("m1", data.error || "Something went wrong. Try again.", "error");
        } else {
            showMsg("m1", data.message, "success");
            userEmail = email;
            document.getElementById("emailShow").textContent = email;
            setTimeout(() => { goStep(2); startTimer(300); }, 900);
        }
    } catch {
        showMsg("m1", "Network error. Check your connection.", "error");
    }
    btn.disabled = false; btn.textContent = "Send OTP";
}

async function resendOTP() {
    clearMsg("m2");
    document.getElementById("btnResend").disabled = true;
    try {
        const { ok, data } = await api("/forgot-password", { email: userEmail });
        if (!ok) {
            showMsg("m2", data.error || "Failed to resend.", "error");
            document.getElementById("btnResend").disabled = false;
        } else {
            showMsg("m2", "New OTP sent!", "success");
            document.getElementById("otp").value = "";
            startTimer(300);
        }
    } catch {
        showMsg("m2", "Network error.", "error");
        document.getElementById("btnResend").disabled = false;
    }
}

async function verifyOTP() {
    clearMsg("m2");
    const otp = document.getElementById("otp").value.trim();
    if (!/^\d{6}$/.test(otp)) { showMsg("m2", "Enter the 6-digit OTP.", "error"); return; }

    const btn = document.getElementById("btnVerify");
    btn.disabled = true; btn.textContent = "Verifying…";

    try {
        const { ok, data } = await api("/verify-otp", { email: userEmail, otp });
        if (!ok) {
            showMsg("m2", data.error || "Incorrect OTP.", "error");
        } else {
            clearInterval(timerID);
            showMsg("m2", data.message, "success");
            setTimeout(() => goStep(3), 900);
        }
    } catch {
        showMsg("m2", "Network error.", "error");
    }
    btn.disabled = false; btn.textContent = "Verify OTP";
}

async function resetPassword() {
    clearMsg("m3");
    const np = document.getElementById("np").value;
    const cp = document.getElementById("cp").value;

    if (!np || !cp)            { showMsg("m3", "Fill in both fields.", "error"); return; }
    if (np !== cp)             { showMsg("m3", "Passwords do not match.", "error"); return; }
    if (np.length < 6)         { showMsg("m3", "Minimum 6 characters.", "error"); return; }
    if (!/\d/.test(np))        { showMsg("m3", "Must contain a number.", "error"); return; }
    if (!/[A-Za-z]/.test(np))  { showMsg("m3", "Must contain a letter.", "error"); return; }

    const btn = document.getElementById("btnReset");
    btn.disabled = true; btn.textContent = "Resetting…";

    try {
        const { ok, data } = await api("/reset-password", { email: userEmail, new_password: np });
        if (!ok) {
            showMsg("m3", data.error || "Reset failed.", "error");
            btn.disabled = false; btn.textContent = "Reset Password";
        } else {
            showMsg("m3", data.message + " Redirecting to login…", "success");
            setTimeout(() => window.location.href = "/login", 2000);
        }
    } catch {
        showMsg("m3", "Network error.", "error");
        btn.disabled = false; btn.textContent = "Reset Password";
    }
}
</script>
</body>
</html>
